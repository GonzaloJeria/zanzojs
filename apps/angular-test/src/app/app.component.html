<div class="app-shell">
  <!-- Sidebar Navigation -->
  <aside class="app-sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">Z</div>
      <div class="brand-text">Zanzo<span class="brand-suffix">JS</span></div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">Main</div>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
        <span class="link-icon">🔘</span>
        <span class="link-text">Control Center</span>
      </a>
      <a routerLink="/showcase" routerLinkActive="active" class="nav-link">
        <span class="link-icon">💎</span>
        <span class="link-text">Integration</span>
      </a>
      
      <div class="nav-group">Protected</div>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <span class="link-icon">📉</span>
        <span class="link-text">Dashboard</span>
      </a>
      <a routerLink="/edit" routerLinkActive="active" class="nav-link">
        <span class="link-icon">✏️</span>
        <span class="link-text">Records</span>
      </a>
      <a routerLink="/export" routerLinkActive="active" class="nav-link">
        <span class="link-icon">📦</span>
        <span class="link-text">Exports</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="connection-status">
        <span class="status-dot"></span>
        <span class="status-text">Engine: Active</span>
      </div>
    </div>
  </aside>

  <!-- Main Work Area -->
  <main class="app-main">
    <header class="app-header">
      <div class="header-content" style="display: flex; gap: 8px;">
        <button [class.active]="ws.activeWorkspace() === 'ws1'" (click)="ws.activeWorkspace.set('ws1')" class="ws-tab">Workspace 1 (ws1)</button>
        <button [class.active]="ws.activeWorkspace() === 'ws2'" (click)="ws.activeWorkspace.set('ws2')" class="ws-tab">Workspace 2 (ws2)</button>
      </div>
    </header>

    <div class="app-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<style>
  .app-shell {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* Sidebar Styles */
  .app-sidebar {
    width: 240px;
    background: oklch(14% 0.01 285);
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 0.75rem;
    flex-shrink: 0;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 0.75rem;
    margin-bottom: 2rem;
  }

  .brand-logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-weight: 700;
    font-size: 1rem;
  }

  .brand-text {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-main);
  }

  .brand-suffix {
    color: var(--text-ghost);
    opacity: 0.5;
  }

  .sidebar-nav {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-group {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-ghost);
    margin: 1.5rem 0.75rem 0.5rem;
    letter-spacing: 0.05em;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.2s ease;
  }

  .nav-link:hover {
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-main);
  }

  .nav-link.active {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-main);
    font-weight: 500;
  }

  .link-icon {
    font-size: 1rem;
    opacity: 0.7;
    filter: grayscale(1);
  }

  .nav-link.active .link-icon {
    filter: none;
    opacity: 1;
  }

  .sidebar-footer {
    padding-top: 1rem;
    border-top: 1px solid var(--border-subtle);
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--success);
  }

  /* Main Area Styles */
  .app-main {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .app-header {
    height: 56px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    background: rgba(12, 12, 12, 0.5);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }

  .breadcrumb {
    font-size: 0.85rem;
    color: var(--text-ghost);
    font-weight: 500;
  }

  .app-content {
    flex-grow: 1;
    overflow-y: auto;
    padding: 0;
    scroll-behavior: smooth;
  }

  .app-content::-webkit-scrollbar { width: 4px; }
  .app-content::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }
  
  .ws-tab {
    padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 500; border: none; cursor: pointer;
    transition: all 0.2s ease; background: transparent; color: var(--text-dim);
  }
  .ws-tab.active {
    background: var(--accent); color: white;
  }
</style>
